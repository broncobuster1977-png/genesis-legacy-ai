<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Microphone Test</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: white; 
            font-family: Arial; 
            padding: 20px;
            text-align: center;
        }
        .test-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 18px;
            cursor: pointer;
            margin: 20px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: rgba(16, 185, 129, 0.3);
        }
        .test-btn:active {
            transform: scale(0.95);
        }
        .status {
            margin: 20px 0;
            padding: 20px;
            background: #333;
            border-radius: 10px;
            min-height: 100px;
        }
        .debug-info {
            font-size: 12px;
            text-align: left;
            background: #222;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>🎤 iPhone Microphone Test</h1>
    <p>This page tests microphone permissions specifically for iPhone/iOS Safari.</p>
    
    <button class="test-btn" onclick="testMicrophone()">
        📱 Test Microphone Permission
    </button>
    
    <div id="status" class="status">
        Ready to test. Tap the button above.
    </div>
    
    <div id="debug-info" class="debug-info">
        <strong>Browser Information:</strong><br>
        <span id="browser-details">Loading...</span>
    </div>
    
    <script>
        let micStream = null;
        
        function updateStatus(message, color = 'white') {
            document.getElementById('status').innerHTML = message;
            document.getElementById('status').style.color = color;
        }
        
        function updateDebugInfo() {
            const userAgent = navigator.userAgent;
            const isIOS = /iPad|iPhone|iPod/.test(userAgent);
            const isSafari = /Safari/.test(userAgent) && !/Chrome|CriOS|FxiOS/.test(userAgent);
            const isIOSChrome = /CriOS/.test(userAgent);
            const hasGetUserMedia = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
            const isHTTPS = window.location.protocol === 'https:';
            
            const debugHTML = `
                Device: ${isIOS ? 'iOS Device' : 'Non-iOS Device'}<br>
                Browser: ${isSafari ? 'Safari' : (isIOSChrome ? 'Chrome on iOS' : 'Other')}<br>
                HTTPS: ${isHTTPS ? 'Yes ✅' : 'No ❌'}<br>
                getUserMedia: ${hasGetUserMedia ? 'Available ✅' : 'Not Available ❌'}<br>
                User Agent: ${userAgent}<br>
                URL: ${window.location.href}
            `;
            
            document.getElementById('browser-details').innerHTML = debugHTML;
        }
        
        async function testMicrophone() {
            updateStatus('🔄 Testing microphone access...', 'orange');
            
            try {
                console.log('Starting microphone test...');
                
                // First check if getUserMedia is available
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error('getUserMedia not supported in this browser');
                }
                
                console.log('getUserMedia is available, requesting permission...');
                
                // Request microphone access
                micStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true
                    },
                    video: false 
                });
                
                console.log('✅ Microphone access granted!');
                
                // Get audio track info
                const audioTracks = micStream.getAudioTracks();
                const trackInfo = audioTracks.length > 0 ? audioTracks[0] : null;
                
                let statusMessage = '✅ Success! Microphone permission granted.<br>';
                statusMessage += `Audio tracks: ${audioTracks.length}<br>`;
                
                if (trackInfo) {
                    statusMessage += `Device: ${trackInfo.label || 'Default microphone'}<br>`;
                    statusMessage += `State: ${trackInfo.readyState}<br>`;
                    statusMessage += `Enabled: ${trackInfo.enabled}`;
                }
                
                updateStatus(statusMessage, 'lightgreen');
                
                // Test for 3 seconds, then stop
                setTimeout(() => {
                    if (micStream) {
                        micStream.getTracks().forEach(track => track.stop());
                        micStream = null;
                        updateStatus('✅ Microphone test completed successfully! The Genesis voice system should work now.', 'lightgreen');
                    }
                }, 3000);
                
            } catch (error) {
                console.error('❌ Microphone test failed:', error);
                
                let errorMessage = '❌ Microphone test failed:<br>';
                errorMessage += `Error: ${error.name} - ${error.message}<br><br>`;
                
                if (error.name === 'NotAllowedError') {
                    errorMessage += '📱 <strong>iPhone Users:</strong><br>';
                    errorMessage += '1. Look for the microphone icon in Safari address bar<br>';
                    errorMessage += '2. Tap it and select "Allow"<br>';
                    errorMessage += '3. Or go to Settings > Safari > Camera & Microphone > Allow<br>';
                    errorMessage += '4. Refresh this page and try again';
                } else if (error.name === 'NotFoundError') {
                    errorMessage += 'No microphone found on this device.';
                } else if (error.name === 'NotReadableError') {
                    errorMessage += 'Microphone is being used by another app. Close other apps and try again.';
                } else {
                    errorMessage += 'Check your browser settings and try again.';
                }
                
                updateStatus(errorMessage, 'lightcoral');
            }
        }
        
        // Initialize page
        window.onload = function() {
            updateDebugInfo();
            updateStatus('Ready to test microphone permission. Tap the button above.', 'lightblue');
        };
    </script>
</body>
</html>
