  <circle cx="165" cy="35" r="1.5" fill="#4a6d8c" opacity="0.6"/>
  <circle cx="175" cy="45" r="2" fill="#6ba3d6" opacity="0.7"/>
  
  <!-- Connecting Lines -->
  <line x1="160" y1="15" x2="170" y2="20" stroke="#6ba3d6" stroke-width="0.5" opacity="0.4"/>
  <line x1="170" y1="20" x2="180" y2="25" stroke="#4a6d8c" stroke-width="0.5" opacity="0.3"/>
  <line x1="165" y1="35" x2="175" y2="45" stroke="#6ba3d6" stroke-width="0.5" opacity="0.4"/>
  
</svg>