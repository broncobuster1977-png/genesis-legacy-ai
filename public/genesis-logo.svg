      <stop offset="0%" style="stop-color:#6ba3d6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a6d8c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield Background -->
  <path d="M15 10 L35 10 Q40 10 40 15 L40 35 Q40 45 30 50 L25 52 Q25 52 25 52 Q25 52 20 50 Q10 45 10 35 L10 15 Q10 10 15 10 Z" fill="url(#logoGradient)" stroke="#1a2744" stroke-width="1"/>
  
  <!-- G in Shield -->
  <text x="25" y="35" font-family="Orbitron, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">G</text>
  
  <!-- Company Name -->
  <text x="55" y="25" font-family="Orbitron, sans-serif" font-size="16" font-weight="700" fill="#1a2744">Genesis</text>
  <text x="55" y="42" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#4a6d8c">LEGACY AI</text>
  
  <!-- Neural Network Elements -->
  <circle cx="160" cy="15" r="2" fill="#6ba3d6" opacity="0.7"/>
  <circle cx="170" cy="20" r="1.5" fill="#4a6d8c" opacity="0.6"/>
